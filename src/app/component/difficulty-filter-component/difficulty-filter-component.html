<div class="difficulty-filter">
  <h4 for="difficulty">Filtra per difficoltà:</h4>
  <select id="difficulty" [ngModel]="recipeService.selectedDifficulty()"
    (ngModelChange)="recipeService.setDifficultyValue($event)">
    @for (difficulty of difficulties; track difficulty) {
    <option [value]="difficulty">
      {{ difficulty }}
    </option>
    }
  </select>
</div>
