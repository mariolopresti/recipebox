@if (recipe(); as recipie) {
  <div class="recipe-detail">
    <a routerLink="/">← Torna alla home</a>

    <h2>{{ recipie.nome }}</h2>
    <img [src]="recipie.immagine" [alt]="recipie.nome" class="recipe-detail-image" />

    <p><strong>Tempo:</strong> {{ recipie.tempoPreparazione }} min</p>
    <p><strong>Difficoltà:</strong> {{ recipie.difficolta }}</p>
    <p><strong>Ingredienti:</strong> {{ recipie.ingredienti.join(', ') }}</p>
  </div>
} @else {
  <p>Ricetta non trovata.</p>
}
