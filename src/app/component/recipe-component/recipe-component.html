<app-difficulty-filter></app-difficulty-filter>
<div class="recipe-container">
  @for (recipe of recipes(); track recipe.id; let i = $index) {
    <ng-container *appFilterByName="recipe.nome">
      <ng-container *appFilterDifficulty="recipe.difficolta">
        <app-recipe-card [recipe]="recipe"></app-recipe-card>
      </ng-container>
    </ng-container>
  }
</div>
